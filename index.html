// ── STORAGE (localStorage natif — persiste vraiment) ──────────────────────
function saveToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; } catch(e) { return false; }
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getAllRepas(repas) {
  if (Array.isArray(repas)) return repas;
  return Object.values(repas || {}).flat();
}
function getTotals(repas) {
  return getAllRepas(repas).reduce((acc, r) => {
    const qty = parseFloat(r.qty) || 0;
    return { kcal: acc.kcal + (parseFloat(r.kcal)||0)*qty, p: acc.p + (parseFloat(r.p)||0)*qty, g: acc.g + (parseFloat(r.g)||0)*qty, l: acc.l + (parseFloat(r.l)||0)*qty };
  }, { kcal:0, p:0, g:0, l:0 });
}
function pct(val, goal) {
  if (!goal || goal <= 0) return 0;
  return Math.round((parseFloat(val) / parseFloat(goal)) * 100);
}

// ── ATOMS ─────────────────────────────────────────────────────────────────
function MacroBar({ label, val, goal, color, unit="g" }) {
  const v = parseFloat(val)||0, g = parseFloat(goal)||1;
  const p = Math.round((v/g)*100), barP = Math.min(100,p), over = v > g*1.05;
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9ba3b5",marginBottom:4}}>
        <span>{label}</span>
        <span style={{color:over?"#e74c3c":p>=85?"#4ade80":color,fontWeight:700}}>{Math.round(v)}{unit} / {goal}{unit} {over?"⚠️":p>=85?"✅":""}</span>
      </div>
      <div style={{background:"#2a2d3e",borderRadius:99,height:7,overflow:"hidden"}}>
        <div style={{width:`${barP}%`,background:over?"#e74c3c":color,height:"100%",borderRadius:99,transition:"width 0.3s"}}/>
      </div>
    </div>
  );
}

function ScoreRing({ score, size=60 }) {
  const r=size/2-6, circ=2*Math.PI*r, color=score>=80?"#4ade80":score>=50?"#f39c12":"#e74c3c";
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2a2d3e" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6} strokeDasharray={`${(score/100)*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.5s"}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle" style={{fill:color,fontSize:size<50?11:14,fontWeight:800,transform:"rotate(90deg)",transformOrigin:`${size/2}px ${size/2}px`}}>{score}</text>
    </svg>
  );
}

// ── SEANCE JOURNAL ────────────────────────────────────────────────────────
function SeanceJournal({ sportType, seance, onUpdate }) {
  const [addOpen, setAddOpen] = useState(false);
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [walkData, setWalkData] = useState({ distance:"", duree:"", terrain:"plat" });
  const isWalk = sportType==="marche", isCardio=sportType==="cardio", isHiit=sportType==="hiit";
  const dbExos = EXERCISES_DB[sportType]||[];

  function addExo(exo) {
    onUpdate([...seance, { id:Date.now(), nom:exo.nom, muscles:exo.muscles, unite:exo.unite,
      sets: Array.from({length:exo.defaultSets},(_,i)=>({id:i,reps:exo.defaultReps||"",poids:"",done:false})) }]);
    setAddOpen(false);
  }
  function removeExo(id) { onUpdate(seance.filter(e=>e.id!==id)); }
  function updateSet(eid,sid,field,val) { onUpdate(seance.map(e=>e.id!==eid?e:{...e,sets:e.sets.map(s=>s.id!==sid?s:{...s,[field]:val})})); }
  function addSet(eid) { onUpdate(seance.map(e=>e.id!==eid?e:{...e,sets:[...e.sets,{id:Date.now(),reps:e.sets[0]?.reps||"",poids:e.sets[0]?.poids||"",done:false}]})); }
  function toggleSet(eid,sid) { onUpdate(seance.map(e=>e.id!==eid?e:{...e,sets:e.sets.map(s=>s.id!==sid?s:{...s,done:!s.done})})); }

  const doneSets=seance.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  const totalSets=seance.reduce((a,e)=>a+e.sets.length,0);
  const totalVol=seance.reduce((a,e)=>a+e.sets.filter(s=>s.done&&s.poids&&s.reps).reduce((b,s)=>b+(parseFloat(s.poids)||0)*(parseFloat(s.reps)||0),0),0);

  if (isWalk) return (
    <div style={{background:"#1a1d2e",borderRadius:14,padding:16,border:"1px solid #27ae6040"}}>
      <div style={{fontSize:13,color:"#27ae60",fontWeight:700,marginBottom:14,textTransform:"uppercase",letterSpacing:1}}>🚶 Journal de marche</div>
      {[{label:"Distance (km)",field:"distance",placeholder:"ex: 5.2"},{label:"Durée (min)",field:"duree",placeholder:"ex: 45"}].map(f=>(
        <div key={f.field} style={{marginBottom:12}}>
          <div style={{fontSize:11,color:"#9ba3b5",marginBottom:6}}>{f.label}</div>
          <input type="number" value={walkData[f.field]} placeholder={f.placeholder}
            onChange={e=>setWalkData(w=>({...w,[f.field]:e.target.value}))}
            style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:8,padding:"10px 14px",color:"#fff",fontSize:16,fontWeight:700}}/>
        </div>
      ))}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"#9ba3b5",marginBottom:6}}>Terrain</div>
        <div style={{display:"flex",gap:6}}>
          {["plat","montée","varié"].map(t=>(
            <button key={t} onClick={()=>setWalkData(w=>({...w,terrain:t}))} style={{flex:1,padding:"9px 0",border:`2px solid ${walkData.terrain===t?"#27ae60":"#2a2d3e"}`,borderRadius:8,background:walkData.terrain===t?"#27ae6025":"#0f1117",color:walkData.terrain===t?"#27ae60":"#8892a4",fontSize:12,fontWeight:700,cursor:"pointer"}}>{t}</button>
          ))}
        </div>
      </div>
      {walkData.distance&&walkData.duree&&(
        <div style={{background:"#27ae6015",borderRadius:10,padding:12,display:"flex",justifyContent:"space-around"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:"#27ae60"}}>{(parseFloat(walkData.distance)/(parseFloat(walkData.duree)/60)).toFixed(1)} km/h</div><div style={{fontSize:10,color:"#9ba3b5"}}>Vitesse</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:"#27ae60"}}>{Math.round(parseFloat(walkData.distance)*80)} kcal</div><div style={{fontSize:10,color:"#9ba3b5"}}>Kcal est.</div></div>
        </div>
      )}
      <div style={{marginTop:14}}>
        <div style={{fontSize:11,color:"#9ba3b5",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Étirements recommandés</div>
        {["Pigeon hip stretch — 60s/côté","Fente basse — 45s/côté","Étirement ischio — 45s/jambe","Foam roller — 2 min"].map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<3?"1px solid #2a2d3e":"none",fontSize:12,color:"#ccc"}}>
            <span style={{color:"#27ae60"}}>›</span>{s}
          </div>
        ))}
      </div>
    </div>
  );

  if (isCardio||isHiit) return (
    <div style={{background:"#1a1d2e",borderRadius:14,padding:16,border:`1px solid ${isHiit?"#f39c1240":"#3498db40"}`}}>
      <div style={{fontSize:13,color:isHiit?"#f39c12":"#3498db",fontWeight:700,marginBottom:14,textTransform:"uppercase",letterSpacing:1}}>{isHiit?"⚡ HIIT":"🚴 Cardio"}</div>
      {dbExos.map((exo,i)=>{
        const ex=seance.find(e=>e.nom===exo.nom);
        return (
          <div key={i} style={{background:ex?"#0f1117":"#13151f",borderRadius:10,padding:12,marginBottom:6,border:`1px solid ${ex?(isHiit?"#f39c12":"#3498db"):"#2a2d3e"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:13,fontWeight:700}}>{exo.nom}</div><div style={{fontSize:11,color:"#9ba3b5"}}>{exo.muscles}</div></div>
              {!ex?(
                <button onClick={()=>addExo(exo)} style={{background:isHiit?"#f39c1225":"#3498db25",border:`1px solid ${isHiit?"#f39c12":"#3498db"}`,borderRadius:8,padding:"6px 12px",color:isHiit?"#f39c12":"#3498db",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Ajouter</button>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {ex.sets.map(s=>(
                    <div key={s.id} style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input type="number" value={s.reps} placeholder={exo.unite} onChange={e=>updateSet(ex.id,s.id,"reps",e.target.value)}
                        style={{width:55,background:"#1a1d2e",border:"1px solid #2a2d3e",borderRadius:6,padding:"4px 6px",color:"#fff",fontSize:12,textAlign:"center"}}/>
                      <span style={{fontSize:10,color:"#9ba3b5"}}>{exo.unite}</span>
                      <button onClick={()=>toggleSet(ex.id,s.id)} style={{background:s.done?"#27ae6030":"#2a2d3e",border:`1px solid ${s.done?"#27ae60":"#3a3d4e"}`,borderRadius:6,padding:"4px 8px",color:s.done?"#27ae60":"#5a6478",fontSize:12,cursor:"pointer"}}>{s.done?"✓":"○"}</button>
                    </div>
                  ))}
                  <button onClick={()=>removeExo(ex.id)} style={{background:"none",border:"none",color:"#e74c3c",fontSize:10,cursor:"pointer",textAlign:"right"}}>Supprimer</button>
                </div>
              )}
            </div>
          </div>
        );
      })}
      {seance.length>0&&(
        <div style={{background:isHiit?"#f39c1215":"#3498db15",borderRadius:10,padding:12,marginTop:8,display:"flex",justifyContent:"space-around"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:900,color:isHiit?"#f39c12":"#3498db"}}>{doneSets}/{totalSets}</div><div style={{fontSize:10,color:"#9ba3b5"}}>Séries</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:900,color:"#4ade80"}}>{Math.round((doneSets/Math.max(totalSets,1))*100)}%</div><div style={{fontSize:10,color:"#9ba3b5"}}>Complétion</div></div>
        </div>
      )}
    </div>
  );

  // MUSCU
  return (
    <div>
      {seance.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[{label:"Exercices",val:seance.length,color:"#e74c3c"},{label:"Séries done",val:`${doneSets}/${totalSets}`,color:"#4ade80"},{label:"Volume",val:totalVol>0?`${Math.round(totalVol/1000)}t`:"—",color:"#f39c12"}].map((s,i)=>(
            <div key={i} style={{background:"#1a1d2e",borderRadius:10,padding:"10px",textAlign:"center",border:`1px solid ${s.color}30`}}>
              <div style={{fontSize:18,fontWeight:900,color:s.color}}>{s.val}</div>
              <div style={{fontSize:10,color:"#9ba3b5"}}>{s.label}</div>
            </div>
          ))}
        </div>
      )}
      {seance.map((exo,ei)=>{
        const isExp=expandedIdx===ei;
        const doneE=exo.sets.filter(s=>s.done).length;
        return (
          <div key={exo.id} style={{background:"#1a1d2e",borderRadius:14,marginBottom:10,border:`1px solid ${doneE===exo.sets.length&&doneE>0?"#4ade8060":"#2a2d3e"}`,overflow:"hidden"}}>
            <div onClick={()=>setExpandedIdx(isExp?null:ei)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",cursor:"pointer"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:800}}>{exo.nom}</div>
                <div style={{fontSize:11,color:"#9ba3b5",marginTop:2}}>{exo.muscles}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{background:doneE===exo.sets.length&&doneE>0?"#4ade8025":"#0f1117",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,color:doneE===exo.sets.length&&doneE>0?"#4ade80":"#f39c12"}}>{doneE}/{exo.sets.length}</div>
                <span style={{color:"#5a6478",fontSize:16}}>{isExp?"▲":"▼"}</span>
              </div>
            </div>
            {isExp&&(
              <div style={{padding:"0 16px 14px"}}>
                <div style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 1fr 36px",gap:6,marginBottom:8}}>
                  {["Série","Reps","Poids","Total",""].map((h,i)=>(
                    <div key={i} style={{fontSize:10,color:"#5a6478",textAlign:"center",fontWeight:700,textTransform:"uppercase"}}>{h}</div>
                  ))}
                </div>
                {exo.sets.map((s,si)=>{
                  const charge=s.reps&&s.poids?`${parseFloat(s.poids)*parseFloat(s.reps)}kg`:"—";
                  return (
                    <div key={s.id} style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 1fr 36px",gap:6,marginBottom:6,alignItems:"center",opacity:s.done?0.65:1}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:s.done?"#4ade8025":"#0f1117",border:`2px solid ${s.done?"#4ade80":"#2a2d3e"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:s.done?"#4ade80":"#5a6478"}}>{si+1}</div>
                      <input type="number" value={s.reps} placeholder="reps" onChange={e=>updateSet(exo.id,s.id,"reps",e.target.value)} style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:8,padding:"8px 4px",color:"#fff",fontSize:14,fontWeight:700,textAlign:"center",width:"100%"}}/>
                      <input type="number" value={s.poids} placeholder={exo.unite==="bw"?"BW":"kg"} onChange={e=>updateSet(exo.id,s.id,"poids",e.target.value)} style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:8,padding:"8px 4px",color:"#fff",fontSize:14,fontWeight:700,textAlign:"center",width:"100%"}}/>
                      <div style={{textAlign:"center",fontSize:11,color:"#f39c12",fontWeight:700}}>{charge}</div>
                      <button onClick={()=>toggleSet(exo.id,s.id)} style={{width:34,height:34,borderRadius:8,border:`2px solid ${s.done?"#4ade80":"#2a2d3e"}`,background:s.done?"#4ade8025":"#0f1117",color:s.done?"#4ade80":"#5a6478",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{s.done?"✓":"○"}</button>
                    </div>
                  );
                })}
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={()=>addSet(exo.id)} style={{flex:1,background:"#27ae6015",border:"1px solid #27ae6040",borderRadius:8,padding:"8px",color:"#27ae60",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Série</button>
                  <button onClick={()=>removeExo(exo.id)} style={{background:"#e74c3c15",border:"1px solid #e74c3c40",borderRadius:8,padding:"8px 14px",color:"#e74c3c",fontSize:12,fontWeight:700,cursor:"pointer"}}>Supprimer</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
      <button onClick={()=>setAddOpen(true)} style={{width:"100%",background:"#1a1d2e",border:"2px dashed #2a2d3e",borderRadius:14,padding:"16px",color:"#8892a4",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:4}}>+ Ajouter un exercice</button>
      {addOpen&&(
        <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"flex-end",zIndex:1000}} onClick={e=>e.target===e.currentTarget&&setAddOpen(false)}>
          <div style={{background:"#1a1d2e",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxHeight:"75vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{margin:0,fontSize:16}}>Choisir un exercice</h3>
              <button onClick={()=>setAddOpen(false)} style={{background:"#2a2d3e",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>✕</button>
            </div>
            {dbExos.map((exo,i)=>{
              const already=seance.some(e=>e.nom===exo.nom);
              return (
                <div key={i} onClick={()=>!already&&addExo(exo)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:i<dbExos.length-1?"1px solid #2a2d3e":"none",cursor:already?"default":"pointer",opacity:already?0.4:1}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:600}}>{exo.nom}</div>
                    <div style={{fontSize:11,color:"#9ba3b5"}}>{exo.muscles} · {exo.defaultSets}×{exo.defaultReps||"?"} {exo.unite}</div>
                  </div>
                  <div style={{fontSize:12,color:already?"#5a6478":"#4ade80",fontWeight:700}}>{already?"✓ Ajouté":"+ Ajouter"}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADD FOOD MODAL (multi-sélection) ─────────────────────────────────────
function AddFoodModal({ onAdd, onClose, defaultMoment }) {
  const [mode, setMode] = useState("preset");
  const [search, setSearch] = useState("");
  const [selectedCat, setSelectedCat] = useState(null);
  const [moment, setMoment] = useState(defaultMoment || "dejeuner");
  // Multi-selection: { [nom]: qty }
  const [basket, setBasket] = useState({});
  const [custom, setCustom] = useState({ nom:"",kcal:"",p:"",g:"",l:"" });

  const searchResults = search.length > 1 ? FOOD_PRESETS.filter(f=>f.nom.toLowerCase().includes(search.toLowerCase())) : [];
  const catItems = selectedCat ? FOOD_CATEGORIES.find(c=>c.cat===selectedCat)?.items || [] : [];
  const showItems = search.length > 1 ? searchResults : catItems;
  const basketCount = Object.keys(basket).length;
  const basketKcal = Object.entries(basket).reduce((acc,[nom,qty])=>{
    const f = FOOD_PRESETS.find(x=>x.nom===nom);
    return acc + (f ? f.kcal * qty : 0);
  }, 0);

  function toggleItem(f) {
    setBasket(b => {
      if (b[f.nom]) { const n={...b}; delete n[f.nom]; return n; }
      return {...b, [f.nom]: 1};
    });
  }
  function setItemQty(nom, qty) {
    const q = parseFloat(qty);
    if (!q || q <= 0) { setBasket(b=>{ const n={...b}; delete n[nom]; return n; }); return; }
    setBasket(b=>({...b,[nom]:q}));
  }
  function handleAddAll() {
    if (mode==="preset") {
      Object.entries(basket).forEach(([nom,qty])=>{
        const f = FOOD_PRESETS.find(x=>x.nom===nom);
        if (f) onAdd({...f, qty, id:Date.now()+Math.random(), moment});
      });
    } else if (custom.nom) {
      onAdd({nom:custom.nom,kcal:parseFloat(custom.kcal)||0,p:parseFloat(custom.p)||0,g:parseFloat(custom.g)||0,l:parseFloat(custom.l)||0,qty:1,id:Date.now(),moment});
    }
    onClose();
  }

  const canAdd = mode==="preset" ? basketCount > 0 : !!custom.nom;

  return (
    <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"flex-end",zIndex:1000}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#1a1d2e",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxHeight:"92vh",overflowY:"auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <h3 style={{margin:0,fontSize:16}}>Ajouter des aliments</h3>
            <div style={{fontSize:11,color:"#9ba3b5",marginTop:2}}>Appuie sur plusieurs aliments pour les sélectionner</div>
          </div>
          <button onClick={onClose} style={{background:"#2a2d3e",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",flexShrink:0}}>✕</button>
        </div>

        {/* Moment selector */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"#5a6478",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Ajouter à</div>
          <div style={{display:"flex",gap:6,overflowX:"auto"}}>
            {MEAL_MOMENTS.map(m=>(
              <button key={m.id} onClick={()=>setMoment(m.id)} style={{flexShrink:0,padding:"7px 12px",border:`2px solid ${moment===m.id?m.color:"#2a2d3e"}`,borderRadius:20,background:moment===m.id?m.color+"25":"#0f1117",color:moment===m.id?m.color:"#8892a4",fontSize:11,fontWeight:700,cursor:"pointer"}}>{m.label}</button>
            ))}
          </div>
        </div>

        {/* Mode toggle */}
        <div style={{display:"flex",background:"#0f1117",borderRadius:10,padding:3,marginBottom:12}}>
          {[["preset","🔍 Bibliothèque"],["custom","✏️ Manuel"]].map(([m,l])=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"9px 0",border:"none",borderRadius:8,cursor:"pointer",background:mode===m?"#3498db":"transparent",color:mode===m?"#fff":"#8892a4",fontSize:12,fontWeight:700}}>{l}</button>
          ))}
        </div>

        {mode==="preset" ? (
          <>
            {/* Search */}
            <input value={search} onChange={e=>{setSearch(e.target.value);setSelectedCat(null);}} placeholder="🔍 Rechercher un aliment..." style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,marginBottom:10}}/>

            {/* Category chips */}
            {!search && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {FOOD_CATEGORIES.map((c,i)=>(
                  <button key={i} onClick={()=>setSelectedCat(selectedCat===c.cat?null:c.cat)} style={{padding:"5px 10px",border:`1px solid ${selectedCat===c.cat?"#3498db":"#2a2d3e"}`,borderRadius:20,background:selectedCat===c.cat?"#3498db20":"#0f1117",color:selectedCat===c.cat?"#3498db":"#8892a4",fontSize:11,fontWeight:600,cursor:"pointer"}}>{c.cat}</button>
                ))}
              </div>
            )}

            {/* Items list */}
            <div style={{maxHeight:260,overflowY:"auto",marginBottom:10}}>
              {showItems.length===0&&!selectedCat&&!search&&(
                <div style={{textAlign:"center",padding:"24px 0",color:"#5a6478",fontSize:13}}>Sélectionne une catégorie ou recherche</div>
              )}
              {showItems.map((f,i)=>{
                const inBasket = !!basket[f.nom];
                const qty = basket[f.nom] || 1;
                return (
                  <div key={i} style={{borderRadius:10,marginBottom:5,background:inBasket?"#27ae6015":"#0f1117",border:`2px solid ${inBasket?"#27ae60":"#2a2d3e"}`,overflow:"hidden",transition:"all 0.15s"}}>
                    {/* Row principale — tap pour toggle */}
                    <div onClick={()=>toggleItem(f)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",cursor:"pointer"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${inBasket?"#27ae60":"#2a2d3e"}`,background:inBasket?"#27ae60":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0}}>{inBasket?"✓":""}</div>
                          <div style={{fontSize:13,fontWeight:inBasket?700:600,color:inBasket?"#fff":"#ccc"}}>{f.nom}</div>
                        </div>
                        <div style={{fontSize:11,color:"#9ba3b5",marginTop:2,marginLeft:28}}>P:{f.p}g · G:{f.g}g · L:{f.l}g</div>
                      </div>
                      <div style={{fontSize:13,fontWeight:800,color:inBasket?"#4ade80":"#f39c12",flexShrink:0,marginLeft:8}}>{inBasket?Math.round(f.kcal*qty):f.kcal} kcal</div>
                    </div>
                    {/* Quantité — apparaît si sélectionné */}
                    {inBasket && (
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 12px 10px",borderTop:"1px solid #27ae6030"}}>
                        <div style={{fontSize:11,color:"#27ae60",fontWeight:700,flex:1}}>Quantité</div>
                        <button onClick={e=>{e.stopPropagation();setItemQty(f.nom,Math.max(0.5,qty-0.5));}} style={{background:"#2a2d3e",border:"none",color:"#fff",borderRadius:6,width:30,height:30,fontSize:16,cursor:"pointer"}}>−</button>
                        <input type="number" value={qty} onClick={e=>e.stopPropagation()} onChange={e=>setItemQty(f.nom,e.target.value)} style={{width:50,background:"#0f1117",border:"1px solid #27ae6060",borderRadius:6,padding:"4px",color:"#fff",fontSize:14,fontWeight:700,textAlign:"center"}}/>
                        <button onClick={e=>{e.stopPropagation();setItemQty(f.nom,qty+0.5);}} style={{background:"#2a2d3e",border:"none",color:"#fff",borderRadius:6,width:30,height:30,fontSize:16,cursor:"pointer"}}>+</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Panier récap */}
            {basketCount > 0 && (
              <div style={{background:"#27ae6015",borderRadius:10,padding:"10px 14px",marginBottom:10,border:"1px solid #27ae6040"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#27ae60"}}>{basketCount} aliment{basketCount>1?"s":""} sélectionné{basketCount>1?"s":""}</div>
                  <div style={{fontSize:13,fontWeight:800,color:"#f39c12"}}>{Math.round(basketKcal)} kcal</div>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
                  {Object.entries(basket).map(([nom,q])=>(
                    <div key={nom} style={{background:"#27ae6025",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#27ae60",fontWeight:600}}>
                      {nom.split(" ")[0]}… ×{q}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[{key:"nom",label:"Nom",type:"text"},{key:"kcal",label:"Calories (kcal)",type:"number"},{key:"p",label:"Protéines (g)",type:"number"},{key:"g",label:"Glucides (g)",type:"number"},{key:"l",label:"Lipides (g)",type:"number"}].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:11,color:"#9ba3b5",marginBottom:4}}>{f.label}</div>
                <input type={f.type} value={custom[f.key]} onChange={e=>setCustom(c=>({...c,[f.key]:e.target.value}))} style={{width:"100%",background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:13}}/>
              </div>
            ))}
          </div>
        )}

        {/* Bouton valider */}
        <button onClick={handleAddAll} disabled={!canAdd} style={{width:"100%",marginTop:6,padding:14,background:canAdd?"linear-gradient(135deg,#27ae60,#1e8449)":"#2a2d3e",border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:800,cursor:canAdd?"pointer":"default",opacity:canAdd?1:0.5}}>
          {mode==="preset" && basketCount > 0 ? `✅ Ajouter ${basketCount} aliment${basketCount>1?"s":""}` : "✅ Ajouter"}
        </button>
      </div>
    </div>
  );
}

// ── AI ANALYSIS ───────────────────────────────────────────────────────────
function AIAnalysis({ dayData, dayName }) {
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(false);
  const totals = getTotals(getAllRepas(dayData.repas));
  const sport = SPORT_TYPES[dayData.sport];

  async function analyze() {
    setOpen(o=>!o);
    if (result||loading) return;
    setLoading(true);
    const seanceText = dayData.seance.length>0
      ? dayData.seance.map(e=>`${e.nom}: ${e.sets.filter(s=>s.done).length}/${e.sets.length} séries${e.sets[0]?.poids?`, ${e.sets[0].poids}kg`:""}`).join(", ")
      : "Aucun exercice";
    const prompt = `Coach fitness expert. Analyse pour un homme 37 ans, 188cm, ~${dayData.poids||"117"} kg, objectif 100kg, InBody 78/100, muscu élevée, graisse viscérale niv.16.
${dayName} : Sport: ${sport?.label||"Aucun"} ${dayData.duree}min | Séance: ${seanceText} | Pas: ${dayData.steps||0} | Eau: ${dayData.eau}ml
Repas: ${getAllRepas(dayData.repas).length===0?"Aucun":getAllRepas(dayData.repas).map(r=>`${r.nom}x${r.qty}(${Math.round(r.kcal*r.qty)}kcal P:${Math.round(r.p*r.qty)}g)`).join(", ")}
Totaux: ${Math.round(totals.kcal)}kcal | P:${Math.round(totals.p)}g G:${Math.round(totals.g)}g L:${Math.round(totals.l)}g
Objectifs: 1850kcal P:200g G:150g L:65g | Note: ${dayData.note||"—"}
3 parties max, 100 mots, français, direct, emojis: 1.✅ Positifs 2.⚠️ À corriger 3.💡 1 conseil concret demain`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:250,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      setResult(data.content?.map(b=>b.text||"").join("")||"Erreur.");
    } catch { setResult("Erreur de connexion."); }
    setLoading(false);
  }

  return (
    <div style={{marginTop:14}}>
      <button onClick={analyze} style={{width:"100%",background:open?"#1a1d2e":"linear-gradient(135deg,#8e44ad,#6c3483)",border:"1px solid #8e44ad50",borderRadius:12,padding:"14px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
        {loading?"⟳ Analyse...":open&&result?"🤖 Masquer l'analyse":"🤖 Analyser ma journée"}
      </button>
      {open&&<div style={{marginTop:8,background:"#1a1d2e",borderRadius:12,padding:16,border:"1px solid #8e44ad40",fontSize:13,lineHeight:1.7,color:"#d0d8e8",whiteSpace:"pre-wrap",animation:"fadeIn 0.3s ease"}}>{loading?"⟳ Analyse en cours...":result}</div>}
    </div>
  );
}

  useEffect(()=>{
    const saved = loadFromStorage();
    if (saved) {
      if (Array.isArray(saved.week)&&saved.week.length===7) setWeek(saved.week);
      if (typeof saved.activeDay==="number") setActiveDay(saved.activeDay);
    }

  // Sauvegarde dans localStorage à chaque changement de week

  });

    setWeek(newWeek); saveWeek(newWeek);

            </div>
            <div style={{background:"#1a1d2e",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #2a2d3e"}}>
              <div style={{fontSize:11,color:"#8892a4",marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Score par jour</div>
              {DAYS_FULL.map((d,i)=>{
                const s=weekStats[i],c=s>=80?"#4ade80":s>=50?"#f39c12":"#e74c3c",hasData=week[i].repas.length>0||week[i].sport;
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<6?"1px solid #2a2d3e":"none"}}>
                    <div style={{width:14,fontSize:14}}>{SPORT_TYPES[WEEK_PLAN[i]]?.icon}</div>
                    <div style={{width:52,fontSize:11,color:i===activeDay?"#4ade80":"#9ba3b5",fontWeight:i===activeDay?700:400}}>{d.slice(0,3)} {DATES[i]}/6</div>
                    <div style={{flex:1,background:"#0f1117",borderRadius:99,height:8,overflow:"hidden"}}><div style={{width:`${hasData?s:0}%`,background:c,height:"100%",borderRadius:99,transition:"width 0.4s"}}/></div>
                    <div style={{width:28,textAlign:"right",fontSize:13,fontWeight:800,color:c}}>{hasData?s:"—"}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {[
                {icon:"🔥",l:"Kcal semaine",v:`${Math.round(week.reduce((a,d)=>a+getTotals(getAllRepas(d.repas)).kcal,0)).toLocaleString()}`,sub:`/ ${(GOALS.calories*7).toLocaleString()}`,c:"#f39c12"},
                {icon:"💪",l:"Protéines",v:`${Math.round(week.reduce((a,d)=>a+getTotals(getAllRepas(d.repas)).p,0))}g`,sub:`/ ${GOALS.proteines*7}g`,c:"#e74c3c"},
                {icon:"🏋️",l:"Séances",v:week.filter(d=>d.sport&&d.sport!=="repos").length,sub:"/ 6 actifs",c:"#8e44ad"},
                {icon:"⚖️",l:"Poids relevé",v:`${week.filter(d=>d.poids).length}j`,sub:week.filter(d=>d.poids).at(-1)?.poids?`Dernier: ${week.filter(d=>d.poids).at(-1).poids} kg`:"Aucun",c:"#3498db"},
              ].map((s,i)=>(
                <div key={i} style={{background:"#1a1d2e",borderRadius:12,padding:"12px",border:`1px solid ${s.c}30`}}>
                  <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
                  <div style={{fontSize:18,fontWeight:900,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:10,color:"#9ba3b5",marginTop:1}}>{s.l}</div>
                  <div style={{fontSize:10,color:"#5a6478",marginTop:1}}>{s.sub}</div>
                </div>
              ))}
            </div>
            {week.some(d=>d.poids)&&(
              <div style={{background:"#1a1d2e",borderRadius:12,padding:16,border:"1px solid #2a2d3e"}}>
                <div style={{fontSize:11,color:"#8892a4",marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>📈 Évolution poids</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:6,height:70}}>
                  {week.map((d,i)=>{
                    const w=parseFloat(d.poids),allW=week.map(x=>parseFloat(x.poids)).filter(Boolean);
                    const mn=Math.min(...allW)-0.5,mx=Math.max(...allW)+0.5;
                    const h=d.poids?Math.max(10,((w-mn)/(mx-mn||1))*55+10):0;
                    return (
                      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                        {d.poids&&<div style={{fontSize:8,color:"#4ade80"}}>{w}</div>}
                        <div style={{width:"100%",height:d.poids?h:4,background:d.poids?"#4ade80":"#2a2d3e",borderRadius:"4px 4px 0 0",transition:"height 0.3s"}}/>
                        <div style={{fontSize:8,color:"#5a6478"}}>{DATES[i]}/6</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {showFood&&<AddFoodModal onAdd={addFood} onClose={()=>setShowFood(false)} defaultMoment={foodMoment}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
